name: Test

on:
  push:
  pull_request:

jobs:
  test:
    name: Typecheck, test, and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run checks
        run: npm run check
