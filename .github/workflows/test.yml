name: Test

on:
  push:
  pull_request:

jobs:
  test:
    name: Typecheck, test, and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Check generated bundle
        run: git diff --exit-code -- dist/big-slider-card.js

      - name: Check diff hygiene
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.sha }}"

      - name: Check pushed commit hygiene
        if: github.event_name == 'push'
        run: git show --check --format= "${{ github.sha }}"
